<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산 결과</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .result-box {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .formula {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
        }
        .final-result {
            font-size: 2.5rem;
            font-weight: bold;
            color: #4CAF50; /* 초록색 포인트 */
            margin-bottom: 30px;
        }
        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <div class="result-box">
        <h1>📊 {{ operator }} 연산 결과</h1>
        <div class="formula">{{ num1 }} 와(과) {{ num2 }}의 계산 결과는?</div>
        <div class="final-result">{{ result }}</div>
        <a href="/" class="back-btn">다시 계산하기</a>
    </div>

</body>
</html>
